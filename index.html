<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valeria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fdf2f8;
            font-family: 'Nunito', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #4a4a4a;
        }

        .card {
            background: #ffffff;
            width: 90%;
            max-width: 450px;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(219, 39, 119, 0.08);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #f472b6, #fbcfe8);
        }

        .decorations {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .decorations svg {
            width: 45px;
            height: 45px;
            stroke: #f472b6;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .name {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: #db2777;
            margin: 0;
            letter-spacing: 1px;
            line-height: 1;
        }

        .subtitle {
            font-size: 1rem;
            color: #9ca3af;
            margin-top: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="decorations">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 3v17M12 20h4m-8 0h4M4 7h16M6 7l-2 5h4l-2-5M18 7l-2 5h4l-2-5M6 12c0 2 1.5 3.5 3 3.5M18 12c0 2-1.5 3.5-3 3.5"></path>
            </svg>
            
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M13 3v8.5c0 1.5.5 3 1.5 4.5l2.5 3c1 1.2.5 3-1 3.5-1.5.5-3 .5-4.5.5-2.5 0-4.5-2-4.5-4.5v-10c0-1.5 1-3 2.5-3h3.5z"></path>
                <path d="M9 7h4M9 11h4M10 16a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"></path>
            </svg>
        </div>
        
        <h1 class="name">Valeria</h1>
        <div class="subtitle">Abogacía & medias extrañas</div>
    </div>

</body>
</html>
